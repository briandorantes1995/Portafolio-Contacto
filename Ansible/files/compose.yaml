version: "3.8"

services:

  portafolio:
    image: ghcr.io/briandorantes1995/portafolio-contacto:latest
    container_name: portafolio
    restart: always
    environment:
      CONNECTIONSTRINGS__AZURE_SQL_CONNECTIONSTRING: ${CONNECTIONSTRINGS__AZURE_SQL_CONNECTIONSTRING}
      AZUREEMAIL__CONNECTIONSTRING: ${AZUREEMAIL__CONNECTIONSTRING}
      AZUREBLOB__CONNECTIONSTRING: ${AZUREBLOB__CONNECTIONSTRING}
      APP__BASEURL: ${APP__BASEURL}
      
    networks:
      - internal

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - portafolio

    networks:
      - internal
    
volumes:
  caddy_data:
  caddy_config:


networks:
  internal: